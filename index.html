<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Event Check-In</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

  <style>
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    #reader {
      border-radius: 16px;
      overflow: hidden;
      background: #f1f5f9;
      min-height: 250px;
      border: 2px dashed #cbd5e1;
    }
    #reader button { display: none !important; }
    video { border-radius: 12px; object-fit: cover; }
    .animate-pulse-subtle { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
  </style>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center px-4 py-8">

<div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6">
  
  <div class="text-center mb-4">
    <h1 class="text-xl font-semibold text-slate-800">📱 Event Check-In</h1>
    <p class="text-sm text-slate-500">Scan QR to validate attendee</p>
  </div>

  <div class="flex items-center justify-between bg-slate-50 border rounded-xl px-4 py-3 mb-4">
    <div>
      <p class="text-xs text-slate-500">Total Checked-In</p>
      <p id="counter" class="text-2xl font-semibold text-slate-800">0</p>
    </div>
    <label class="flex items-center gap-2 text-sm cursor-pointer font-medium text-slate-600">
      <input type="checkbox" id="soundToggle" checked class="w-4 h-4 accent-blue-600">
      🔊 Sound
    </label>
  </div>

  <button id="scanBtn" onclick="toggleScanner()"
    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-semibold mb-4 transition shadow-md active:scale-95 flex items-center justify-center gap-2">
    <span id="btnIcon">📷</span> <span id="btnText">Start Scanning</span>
  </button>

  <div id="reader" class="mb-4"></div>

  <div id="loading" class="hidden text-center mb-3">
    <div class="inline-flex items-center gap-2 text-sm text-slate-600">
      <svg class="animate-spin h-5 w-5 text-blue-600" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
      </svg>
      Validating with Database...
    </div>
  </div>

  <div id="result" class="mb-6 min-h-[60px]"></div>

  <div class="border-t pt-4">
    <h3 class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-widest">Recent Check-Ins</h3>
    <ul id="recentList" class="space-y-2 text-sm">
      <li class="text-slate-400 italic text-center py-2">No scans yet</li>
    </ul>
  </div>
</div>

<audio id="scanSound" src="https://assets.mixkit.co/active_storage/sfx/766/766-preview.mp3"></audio>
<audio id="successSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
<audio id="alreadySound" src="https://assets.mixkit.co/active_storage/sfx/1003/1003-preview.mp3"></audio>
<audio id="errorSound" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"></audio>

<script>
let html5QrCode = null;
let totalCheckedIn = 0;
let recentCheckins = [];
let isScanning = false;

// Fix for mobile audio blocking
function unlockAudio() {
  const ids = ["scanSound", "successSound", "alreadySound", "errorSound"];
  ids.forEach(id => {
    const s = document.getElementById(id);
    if(s) { s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(() => {}); }
  });
}

async function toggleScanner() {
  unlockAudio();
  if (isScanning) {
    await stopScanner();
  } else {
    startScanner();
  }
}

async function startScanner() {
  const btn = document.getElementById("scanBtn");
  const btnText = document.getElementById("btnText");
  const btnIcon = document.getElementById("btnIcon");

  btnText.innerText = "Opening Camera...";
  btn.disabled = true;

  html5QrCode = new Html5Qrcode("reader");
  const config = { fps: 10, qrbox: { width: 250, height: 250 } };

  try {
    await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
    isScanning = true;
    btn.disabled = false;
    btn.classList.replace("bg-blue-600", "bg-red-500");
    btnText.innerText = "Stop Scanner";
    btnIcon.innerText = "🛑";
  } catch (err) {
    btn.disabled = false;
    btnText.innerText = "Start Scanning";
    alert("Camera error: " + err);
  }
}

async function stopScanner() {
  const btn = document.getElementById("scanBtn");
  if (html5QrCode) {
    await html5QrCode.stop();
    await html5QrCode.clear();
  }
  isScanning = false;
  btn.classList.replace("bg-red-500", "bg-blue-600");
  document.getElementById("btnText").innerText = "Start Scanning";
  document.getElementById("btnIcon").innerText = "📷";
}

async function onScanSuccess(decodedText) {
  playSound("scanSound");
  
  // Pause scanning while processing so we don't scan the same code 10 times
  if(html5QrCode) html5QrCode.pause();

  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("result").innerHTML = "";

  const scriptURL = "https://script.google.com/macros/s/AKfycbyrYmSbDPGO4vov5u1w7raH0h7mTpnTkTxd7hNI9557N7AlrLsE-AdSCj4AvEj_j3K-xw/exec";

  // Using a standard POST. If you get CORS errors, 
  // ensure your Google Script handles Content-Service properly.
  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({ barcode: decodedText })
  })
  .then(res => res.json())
  .then(data => {
    showResult(data);
  })
  .catch(err => {
    console.error(err);
    // Fallback: If GAS returns a redirect/CORS error, try to at least report it
    showResult({ status: "error", message: "Connection Error" });
  });
}

function playSound(id) {
  if (!document.getElementById("soundToggle").checked) return;
  const s = document.getElementById(id);
  if (s) { s.currentTime = 0; s.play().catch(() => {}); }
}

function showResult(response) {
  document.getElementById("loading").classList.add("hidden");
  let html = "";

  if (response.status === "success") {
    playSound("successSound");
    totalCheckedIn++;
    document.getElementById("counter").innerText = totalCheckedIn;
    addRecent(response.user.name);
    html = `
      <div class="bg-green-50 border border-green-200 rounded-xl p-4">
        <h3 class="font-semibold text-green-800">✅ Welcome, ${response.user.name}</h3>
        <p class="text-xs text-green-700 mt-1">Check-in confirmed.</p>
      </div>`;
  } 
  else if (response.status === "already_checked") {
    playSound("alreadySound");
    html = `
      <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4">
        <h3 class="font-semibold text-yellow-800">⚠️ Duplicate</h3>
        <p class="text-xs text-yellow-700 mt-1">${response.user.name} is already checked in.</p>
      </div>`;
  } 
  else {
    playSound("errorSound");
    html = `
      <div class="bg-red-50 border border-red-200 rounded-xl p-4 text-red-700 font-medium">
        ❌ Invalid or Not Found
      </div>`;
  }

  document.getElementById("result").innerHTML = html;

  // Wait 3 seconds then resume scanner automatically
  setTimeout(() => {
    if (isScanning && html5QrCode) {
      html5QrCode.resume();
      document.getElementById("result").innerHTML = "";
    }
  }, 3000);
}

function addRecent(name) {
  recentCheckins.unshift({
    name,
    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
  });

  if (recentCheckins.length > 5) recentCheckins.pop();

  document.getElementById("recentList").innerHTML = recentCheckins.map(item => `
    <li class="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 flex justify-between items-center">
      <span class="font-medium text-slate-700">${item.name}</span>
      <span class="text-[10px] text-slate-400 font-mono">${item.time}</span>
    </li>
  `).join("");
}
</script>

</body>
</html>
