<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Event Check-In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode@2.3.8"></script>
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    #reader { border-radius: 16px; overflow: hidden; background: #f1f5f9; min-height: 250px; }
    #reader button { display: none !important; }
    video { border-radius: 12px; object-fit: cover; }
  </style>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center px-4 py-8">
<div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6">
  
  <div class="text-center mb-4">
    <h1 class="text-xl font-semibold text-slate-800">📱 Event Check-In</h1>
    <p class="text-sm text-slate-500">Scan QR to validate attendee</p>
  </div>

  <div class="flex items-center justify-between bg-slate-50 border rounded-xl px-4 py-3 mb-4">
    <div>
      <p class="text-xs text-slate-500">Total Checked-In</p>
      <p id="counter" class="text-2xl font-semibold text-slate-800">0</p>
    </div>
    <label class="flex items-center gap-2 text-sm cursor-pointer font-medium text-slate-600">
      <input type="checkbox" id="soundToggle" checked class="w-4 h-4 accent-blue-600">
      🔊 Sound
    </label>
  </div>

  <button id="scanBtn" onclick="startScanner()"
    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-semibold mb-4 transition shadow-md active:scale-95">
    📷 Click Here To Scan QR Code
  </button>

  <div id="reader" class="mb-4"></div>

  <div id="qrValueDisplay" class="hidden mb-3 p-3 bg-slate-50 border border-slate-200 rounded-lg text-center">
    <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">Scanned QR Data</p>
    <p id="rawText" class="text-xs font-mono text-slate-600 break-all"></p>
  </div>

  <div id="loading" class="hidden text-center mb-3">
    <div class="inline-flex items-center gap-2 text-sm text-slate-600">
      <svg class="animate-spin h-5 w-5 text-blue-600" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path></svg>
      Validating...
    </div>
  </div>

  <div id="result" class="mb-6"></div>

  <div class="border-t pt-4">
    <h3 class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-widest">🕒 Last 5 Successful Scans</h3>
    <ul id="recentList" class="space-y-2 text-sm">
      <li id="noHistory" class="text-slate-400 italic text-center py-2">No success history yet</li>
    </ul>
  </div>
</div>

<audio id="scanSound" src="https://assets.mixkit.co/active_storage/sfx/766/766-preview.mp3"></audio>
<audio id="successSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
<audio id="alreadySound" preload="auto">
    <source src="https://www.myinstants.com/media/sounds/wrong-answer-sound-effect.mp3" type="audio/mpeg">
  </audio>

  <audio id="errorSound" preload="auto">
    <source src="https://www.myinstants.com/media/sounds/wrong-answer-sound-effect.mp3" type="audio/mpeg">
  </audio>


<script>
let html5QrCode = null;
let recentCheckins = [];

async function stopScannerSafely() {
  if (html5QrCode && html5QrCode.getState() > 1) {
    try { await html5QrCode.stop(); await html5QrCode.clear(); } catch (err) { console.warn(err); }
  }
}

function unlockAudio() {
  const ids = ["scanSound", "successSound", "alreadySound", "errorSound"];
  ids.forEach(id => {
    const s = document.getElementById(id);
    if(s) { s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(() => {}); }
  });
}

async function startScanner() {
  unlockAudio();
  const btn = document.getElementById("scanBtn");
  document.getElementById("result").innerHTML = "";
  document.getElementById("qrValueDisplay").classList.add("hidden");
  btn.disabled = true;
  btn.innerText = "⌛ Opening Camera...";
  await stopScannerSafely();
  html5QrCode = new Html5Qrcode("reader");
  try {
    await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess);
    btn.innerText = "📷 Scanner Active";
    btn.classList.replace("bg-blue-600", "bg-emerald-600");
  } catch (err) {
    btn.disabled = false;
    btn.innerText = "📷 Click Here To Scan QR Code";
    alert("Camera error: " + err);
  }
}

async function onScanSuccess(decodedText) {
  playSound("scanSound");
  document.getElementById("rawText").innerText = decodedText;
  document.getElementById("qrValueDisplay").classList.remove("hidden");
  await stopScannerSafely();
  const btn = document.getElementById("scanBtn");
  btn.disabled = false;
  btn.innerText = "📷 Click Here To Scan QR Code";
  btn.classList.replace("bg-emerald-600", "bg-blue-600");
  document.getElementById("loading").classList.remove("hidden");

  // YOUR GOOGLE SCRIPT URL
  const scriptURL = "https://script.google.com/macros/s/AKfycbx3T8nIGS49uyr6qcWGumAtqE3r01L0PKlwG0em56JQuH6vE4Qqlc4q1E6Tjek-g-p0yQ/exec";

  fetch(scriptURL, { method: "POST", body: JSON.stringify({ barcode: decodedText }) })
  .then(res => res.json())
  .then(data => showResult(data))
  .catch(err => {
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("result").innerHTML = '<div class="bg-red-50 border border-red-200 rounded-xl p-4 text-red-700">Server Error</div>';
  });
}

function playSound(id) {
  if (!document.getElementById("soundToggle").checked) return;
  const s = document.getElementById(id);
  if (s) { s.currentTime = 0; s.play().catch(() => {}); }
}

function showResult(response) {
  document.getElementById("loading").classList.add("hidden");
  let html = "";

  if (response.status === "success") {
    playSound("successSound");
    // Update Counter from Server Stats
    if(response.stats) document.getElementById("counter").innerText = response.stats.checkedIn;
    addRecent(response.user.name);
    html = `<div class="bg-green-50 border border-green-200 rounded-xl p-4"><h3 class="font-semibold text-green-800">✅ Welcome, ${response.user.name}</h3></div>`;
  } else if (response.status === "already_checked") {
    playSound("alreadySound");
    html = `<div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4"><h3 class="font-semibold text-yellow-800">⚠️ Already In: ${response.user.name}</h3></div>`;
  } else {
    playSound("errorSound");
    html = `<div class="bg-red-50 border border-red-200 rounded-xl p-4 text-red-700">❌ Invalid QR</div>`;
  }
  document.getElementById("result").innerHTML = html;
}

function addRecent(name) {
  const noHistory = document.getElementById("noHistory");
  if(noHistory) noHistory.remove();

  recentCheckins.unshift({ name, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
  if (recentCheckins.length > 5) recentCheckins.pop();

  document.getElementById("recentList").innerHTML = recentCheckins.map(item => `
    <li class="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 flex justify-between items-center animate-in fade-in duration-300">
      <span class="font-medium text-slate-700">${item.name}</span>
      <span class="text-[10px] text-slate-400 font-mono">${item.time}</span>
    </li>
  `).join("");
}
</script>
</body>
</html>
